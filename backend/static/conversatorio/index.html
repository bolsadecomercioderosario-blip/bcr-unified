<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversatorio a la carta — BCR</title>
    <meta name="description" content="Contanos qué tema te gustaría escuchar en el próximo Conversatorio BCR.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0E2A47;
            --ink-soft: #1f3a5f;
            --cyan: #5FDDF2;
            --cyan-strong: #2EC9E3;
            --bg: #F4F6F9;
            --card: #ffffff;
            --border: #E2E8F0;
            --muted: #5B6B82;
            --input-bg: #F8FAFC;
            --error: #b91c1c;
            --success: #047857;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Banda superior dark navy con esquinas inferiores redondeadas, igual
           que los flyers del Conversatorio BCR. */
        .topbar {
            width: 100%;
            background: var(--ink);
            padding: 1.5rem 1rem 2.25rem;
            display: flex;
            justify-content: center;
            border-radius: 0 0 28px 28px;
            position: relative;
        }

        .topbar img {
            height: 72px;
            width: auto;
            max-width: 90%;
            display: block;
        }

        /* Contenido principal */
        .container {
            width: 100%;
            max-width: 620px;
            padding: 2.5rem 1.25rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--ink);
            font-weight: 800;
            font-size: 1.55rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
        }

        .brand svg {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        /* Bloque del título: "a la carta" sobre fondo cyan (highlighter)
           replicando exactamente el estilo de los flyers. */
        .title-wrap {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .title-hl {
            display: inline-block;
            background: var(--cyan);
            color: #ffffff;
            font-size: 2.4rem;
            font-weight: 800;
            padding: 0.25rem 1.1rem 0.35rem;
            line-height: 1.15;
            border-radius: 4px;
            letter-spacing: -0.01em;
        }

        .subtitle {
            color: var(--ink-soft);
            font-size: 1.05rem;
            line-height: 1.55;
            max-width: 520px;
            margin: 1.25rem auto 0;
            text-align: center;
            font-weight: 500;
        }

        /* Tarjeta del formulario */
        .card {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.75rem;
            margin-top: 2rem;
            box-shadow: 0 10px 30px -18px rgba(14, 42, 71, 0.25);
        }

        .field label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 0.55rem;
        }

        .field textarea {
            width: 100%;
            padding: 0.95rem 1rem;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--ink);
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.5;
            outline: none;
            resize: vertical;
            min-height: 140px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .field textarea::placeholder {
            color: #94a3b8;
        }

        .field textarea:focus {
            border-color: var(--cyan-strong);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(94, 221, 242, 0.25);
        }

        .btn {
            width: 100%;
            margin-top: 1.25rem;
            padding: 0.95rem;
            border: none;
            border-radius: 999px;
            background: var(--cyan);
            color: var(--ink);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s ease, transform 0.05s ease;
        }

        .btn:hover:not(:disabled) {
            background: var(--cyan-strong);
            color: #ffffff;
        }

        .btn:active:not(:disabled) { transform: translateY(1px); }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .alert {
            padding: 0.75rem 0.95rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert.error {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: var(--error);
        }

        .alert.show { display: block; }

        /* Estado "gracias" */
        .success-state {
            text-align: center;
            padding: 0.75rem 0.25rem 0.25rem;
        }

        .success-state .check {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--cyan);
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            margin: 0 auto 1.25rem;
        }

        .success-state h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        .success-state p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.55;
            margin-bottom: 1.5rem;
        }

        .link-btn {
            background: transparent;
            border: 1.5px solid var(--cyan-strong);
            color: var(--ink);
            padding: 0.7rem 1.4rem;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: background 0.2s ease;
        }

        .link-btn:hover {
            background: rgba(94, 221, 242, 0.18);
        }

        /* Mobile tweaks */
        @media (max-width: 520px) {
            .topbar { padding: 1.25rem 1rem 2rem; }
            .topbar img { height: 56px; }
            .container { padding: 2rem 1rem 2.5rem; }
            .brand { font-size: 1.25rem; }
            .brand svg { width: 26px; height: 26px; }
            .title-hl { font-size: 1.8rem; padding: 0.2rem 0.85rem 0.3rem; }
            .subtitle { font-size: 0.95rem; }
            .card { padding: 1.35rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="topbar">
            <img src="logo_bcr.png" alt="Bolsa de Comercio de Rosario">
        </header>

        <main class="container">
            <div class="brand" aria-label="Conversatorio BCR">
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M6 7.5C6 6.12 7.12 5 8.5 5h12C21.88 5 23 6.12 23 7.5v8c0 1.38-1.12 2.5-2.5 2.5H13l-4.5 4v-4H8.5C7.12 18 6 16.88 6 15.5v-8z" stroke="#0E2A47" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M11 18.5C11 17.12 12.12 16 13.5 16h12C26.88 16 28 17.12 28 18.5v6c0 1.38-1.12 2.5-2.5 2.5H21l-3 3v-3h-4.5C12.12 27 11 25.88 11 24.5v-6z" stroke="#0E2A47" stroke-width="2" stroke-linejoin="round" fill="#ffffff"/>
                </svg>
                <span>Conversatorio BCR</span>
            </div>

            <div class="title-wrap">
                <span class="title-hl">a la carta</span>
                <p class="subtitle">Contanos qué tema te gustaría escuchar en un próximo conversatorio</p>
            </div>

            <section class="card" id="form-card">
                <div class="alert error" id="alert-error"></div>
                <form id="sug-form" novalidate>
                    <div class="field">
                        <label for="tema">Tu sugerencia</label>
                        <textarea id="tema" name="tema" maxlength="500" required
                                  placeholder="Ej: Perspectivas del mercado de granos para la próxima campaña"></textarea>
                    </div>
                    <button type="submit" class="btn" id="submit-btn">Enviar sugerencia</button>
                </form>
            </section>

            <section class="card" id="success-card" style="display:none;">
                <div class="success-state">
                    <div class="check">✓</div>
                    <h2>¡Gracias!</h2>
                    <p>Recibimos tu sugerencia. La vamos a tener en cuenta para los próximos conversatorios.</p>
                    <button class="link-btn" id="another-btn">Enviar otra</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const form = document.getElementById('sug-form');
        const submitBtn = document.getElementById('submit-btn');
        const alertErr = document.getElementById('alert-error');
        const formCard = document.getElementById('form-card');
        const successCard = document.getElementById('success-card');
        const anotherBtn = document.getElementById('another-btn');

        function showError(msg) {
            alertErr.textContent = msg;
            alertErr.classList.add('show');
        }
        function clearError() {
            alertErr.classList.remove('show');
            alertErr.textContent = '';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const tema = document.getElementById('tema').value.trim();
            if (tema.length < 3) {
                showError('Contanos un poco más sobre el tema (mínimo 3 caracteres).');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando…';

            try {
                const res = await fetch('/api/conversatorio/sugerencias', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tema }),
                });
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.detail || 'No pudimos guardar la sugerencia. Intentalo de nuevo en un minuto.');
                }
                formCard.style.display = 'none';
                successCard.style.display = 'block';
            } catch (err) {
                showError(err.message || 'Error de conexión.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar sugerencia';
            }
        });

        anotherBtn.addEventListener('click', () => {
            form.reset();
            submitBtn.disabled = false;
            submitBtn.textContent = 'Enviar sugerencia';
            successCard.style.display = 'none';
            formCard.style.display = 'block';
            document.getElementById('tema').focus();
        });
    </script>
</body>
</html>
