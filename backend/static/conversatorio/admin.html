<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversatorio a la carta · Admin</title>
    <script src="/static/auth.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --primary-light: #fbbf24;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #273548;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: color 0.2s ease;
        }

        .back-link:hover { color: var(--text); }

        .actions {
            display: flex;
            gap: 0.6rem;
        }

        .btn {
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .btn:hover { border-color: var(--primary); background: var(--bg-card-hover); }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #1f1300;
        }
        .btn-primary:hover { background: var(--primary-light); border-color: var(--primary-light); }

        .header {
            margin-bottom: 1.5rem;
        }

        .header .eyebrow {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .header h1 {
            font-size: 1.85rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.65rem;
            padding: 0.85rem 1.1rem;
            min-width: 140px;
        }

        .stat .num {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-light);
        }
        .stat .lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 0.15rem;
        }

        .empty {
            background: var(--bg-card);
            border: 1px dashed var(--border);
            border-radius: 0.75rem;
            padding: 3rem 1.5rem;
            text-align: center;
            color: var(--text-muted);
        }
        .empty h3 { color: var(--text); margin-bottom: 0.5rem; font-weight: 600; }
        .empty p { font-size: 0.9rem; }

        .list {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem 1.35rem;
            transition: border-color 0.2s ease;
        }

        .item:hover { border-color: rgba(245, 158, 11, 0.35); }

        .item-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.6rem;
        }

        .item-tema {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text);
        }

        .item-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .item-comentarios {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.55;
            white-space: pre-wrap;
            margin: 0.5rem 0 0.75rem;
            padding: 0.65rem 0.85rem;
            background: rgba(15, 23, 42, 0.6);
            border-left: 3px solid var(--primary);
            border-radius: 0.3rem;
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .item-author {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .item-author span strong {
            color: var(--text);
            font-weight: 500;
        }

        .btn-danger {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 0.35rem 0.7rem;
            border-radius: 0.4rem;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s ease, border-color 0.2s ease;
        }
        .btn-danger:hover {
            color: var(--danger);
            border-color: rgba(248, 113, 113, 0.4);
        }

        .loading, .error {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
        .error { color: var(--danger); }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.4rem; }
            .item-head { flex-direction: column; gap: 0.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <a href="/" class="back-link">← Volver al hub</a>
            <div class="actions">
                <a href="/conversatorio/" target="_blank" class="btn">Ver formulario público</a>
                <button class="btn btn-primary" id="export-btn">Descargar CSV</button>
            </div>
        </div>

        <div class="header">
            <div class="eyebrow">Conversatorio a la carta</div>
            <h1>Sugerencias recibidas</h1>
        </div>

        <div class="stats" id="stats" style="display:none;">
            <div class="stat">
                <div class="num" id="stat-total">0</div>
                <div class="lbl">Total</div>
            </div>
            <div class="stat">
                <div class="num" id="stat-week">0</div>
                <div class="lbl">Últimos 7 días</div>
            </div>
        </div>

        <div id="content">
            <div class="loading">Cargando…</div>
        </div>
    </div>

    <script>
        const content = document.getElementById('content');
        const stats = document.getElementById('stats');
        const statTotal = document.getElementById('stat-total');
        const statWeek = document.getElementById('stat-week');
        const exportBtn = document.getElementById('export-btn');

        function escapeHtml(s) {
            return (s || '').replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }

        function fmtDate(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            if (isNaN(d.getTime())) return iso;
            return d.toLocaleString('es-AR', {
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        async function load() {
            content.innerHTML = '<div class="loading">Cargando…</div>';
            try {
                const res = await fetch('/api/conversatorio/sugerencias');
                if (!res.ok) throw new Error('No se pudieron cargar las sugerencias');
                const data = await res.json();
                render(data);
            } catch (err) {
                content.innerHTML = `<div class="error">${escapeHtml(err.message)}</div>`;
            }
        }

        function render(list) {
            stats.style.display = 'flex';
            statTotal.textContent = list.length;
            const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
            statWeek.textContent = list.filter(s => new Date(s.created_at).getTime() >= weekAgo).length;

            if (!list.length) {
                content.innerHTML = `
                    <div class="empty">
                        <h3>Todavía no hay sugerencias</h3>
                        <p>Cuando los socios envíen sus ideas, van a aparecer acá.</p>
                    </div>`;
                return;
            }

            const html = list.map(s => {
                const author = [];
                if (s.nombre) author.push(`<span><strong>${escapeHtml(s.nombre)}</strong></span>`);
                if (s.email) author.push(`<span>${escapeHtml(s.email)}</span>`);
                if (!author.length) author.push('<span>Anónimo</span>');

                return `
                    <div class="item" data-id="${s.id}">
                        <div class="item-head">
                            <div class="item-tema">${escapeHtml(s.tema)}</div>
                            <div class="item-meta">${escapeHtml(fmtDate(s.created_at))}</div>
                        </div>
                        ${s.comentarios ? `<div class="item-comentarios">${escapeHtml(s.comentarios)}</div>` : ''}
                        <div class="item-footer">
                            <div class="item-author">${author.join('')}</div>
                            <button class="btn-danger" data-del="${s.id}">Eliminar</button>
                        </div>
                    </div>`;
            }).join('');
            content.innerHTML = `<div class="list">${html}</div>`;

            content.querySelectorAll('[data-del]').forEach(btn => {
                btn.addEventListener('click', () => removeItem(btn.dataset.del));
            });
        }

        async function removeItem(id) {
            if (!confirm('¿Eliminar esta sugerencia?')) return;
            try {
                const res = await fetch(`/api/conversatorio/sugerencias/${id}`, { method: 'DELETE' });
                if (!res.ok && res.status !== 204) throw new Error('No se pudo eliminar');
                load();
            } catch (err) {
                alert(err.message);
            }
        }

        exportBtn.addEventListener('click', async () => {
            // Hacemos fetch (no <a>) para que pase por el monkey-patch de auth.js
            // y mande el Bearer token; después construimos un blob y lo descargamos.
            try {
                const res = await fetch('/api/conversatorio/sugerencias/export.csv');
                if (!res.ok) throw new Error('No se pudo exportar');
                const blob = await res.blob();
                const cd = res.headers.get('Content-Disposition') || '';
                const m = cd.match(/filename="([^"]+)"/);
                const fname = m ? m[1] : 'conversatorio-sugerencias.csv';
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fname;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            } catch (err) {
                alert(err.message);
            }
        });

        // Esperamos un tick a que auth.js haga su init y muestre overlay si hace falta.
        // Si no hay token, el fetch va a tirar 401 y auth.js muestra el login.
        load();
    </script>
</body>
</html>
