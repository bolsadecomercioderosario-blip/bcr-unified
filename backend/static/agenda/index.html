<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Comunicación | Institución</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <div class="logo">
                        <i data-lucide="calendar-days"></i>
                        <span>Comu BCR</span>
                    </div>
                    <nav class="top-nav">
                        <button class="nav-item active" data-view="list">
                            <i data-lucide="list"></i>
                            <span>Actividades</span>
                        </button>
                        <button class="nav-item" data-view="conectados">
                            <i data-lucide="rss"></i>
                            <span>Conectados</span>
                        </button>
                        <button class="nav-item" data-view="santi">
                            <i data-lucide="video"></i>
                            <span>Santi</span>
                        </button>
                    </nav>
                </div>
                
                <div class="top-bar-right">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="global-search" placeholder="Buscar actividad...">
                    </div>
                    
                    <button id="btn-toggle-past" class="btn-icon" title="Ver/Ocultar Pasadas">
                        <i data-lucide="history"></i>
                    </button>
                    
                    <button id="btn-new-activity" class="btn-primary">
                        <i data-lucide="plus"></i>
                        <span>Nueva Actividad</span>
                    </button>
                </div>
            </header>
            
            <div id="view-container" class="view-container">
                <!-- Content will be injected here by app.js -->
            </div>
        </main>

        <!-- Activity Detail Sheet (Modal/Panel) -->
        <div id="activity-sheet" class="sheet-overlay hidden">
            <div class="sheet-content">
                <!-- Content injected by components/ActivityForm.js -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
    <script>
        // Initialize Lucide icons after DOM content is loaded
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
