<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Agenda de Comunicación | Institución</title>
    <script src="/static/auth.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=__VERSION__">
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <!-- El login lo maneja /static/auth.js (centralizado para todo el hub) -->

    <div id="app" class="app-container">
        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <a href="/" class="btn-hub" title="Volver al Hub">
                        <i data-lucide="arrow-left"></i>
                        <span>Hub</span>
                    </a>
                    <nav class="top-nav">
                        <button class="nav-item active" data-view="list">
                            <i data-lucide="list"></i>
                            <span>Actividades</span>
                        </button>
                        <button class="nav-item" data-view="conectados">
                            <i data-lucide="rss"></i>
                            <span>Conectados</span>
                        </button>
                        <button class="nav-item" data-view="santi">
                            <i data-lucide="video"></i>
                            <span>Santi</span>
                        </button>
                    </nav>
                </div>
                
                <div class="top-bar-right">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="global-search" placeholder="Buscar actividad...">
                    </div>
                    
                    <button id="btn-toggle-past" class="btn-icon" title="Ver/Ocultar Pasadas">
                        <i data-lucide="history"></i>
                    </button>

                    <button id="btn-efemerides" class="btn-icon" title="Efemérides y Aniversarios">
                        <i data-lucide="calendar-clock"></i>
                    </button>

                    <button id="btn-new-activity" class="btn-primary">
                        <i data-lucide="plus"></i>
                        <span>Nueva Actividad</span>
                    </button>
                </div>
            </header>
            
            <div id="view-container" class="view-container">
                <!-- Content will be injected here by app.js -->
            </div>
        </main>

        <!-- Activity Detail Sheet (Modal/Panel) -->
        <div id="activity-sheet" class="sheet-overlay hidden">
            <div class="sheet-content">
                <!-- Content injected by components/ActivityForm.js -->
            </div>
        </div>

        <!-- Efemérides Modal -->
        <div id="efemerides-sheet" class="sheet-overlay hidden">
            <div class="sheet-content">
                <!-- Content injected by components/EfemeridesModal.js -->
            </div>
        </div>

        <!-- Save status toast (Guardando… / Guardado ✓ / Error) -->
        <div id="save-status" class="save-status" data-status="idle" aria-live="polite">
            <span class="save-saving">Guardando…</span>
            <span class="save-saved">Guardado ✓</span>
            <span class="save-error">Error al guardar</span>
        </div>

        <!-- Mobile Bottom Tab Bar (visible solo en mobile via CSS) -->
        <nav class="mobile-bottom-tabs">
            <button class="nav-item active" data-view="list">
                <i data-lucide="calendar-days"></i>
                <span>Agenda</span>
            </button>
            <button class="nav-item" data-view="conectados">
                <i data-lucide="rss"></i>
                <span>Conectados</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js?v=__VERSION__"></script>
    <script>
        // Initialize Lucide icons after DOM content is loaded
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
