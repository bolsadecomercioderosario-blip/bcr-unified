<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Agenda de Comunicación | Institución</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <!-- Login Overlay -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="logo" style="margin-bottom: 1.5rem; justify-content: center;">
                <i data-lucide="lock" style="width: 24px; height: 24px;"></i>
                <span style="font-size: 1.2rem;">Acceso Protegido</span>
            </div>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; text-align: center;">
                Ingresá la contraseña para acceder a la Agenda de Comunicación.
            </p>
            <input type="password" id="login-password" placeholder="Contraseña" style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border); margin-bottom: 1rem; text-align: center;">
            <button id="btn-login" class="btn-primary" style="width: 100%; justify-content: center;">
                Entrar
            </button>
            <p id="login-error" style="color: #ef4444; font-size: 0.8rem; margin-top: 1rem; text-align: center; display: none;">
                Contraseña incorrecta. Reintentá.
            </p>
        </div>
    </div>

    <div id="app" class="app-container">
        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <nav class="top-nav">
                        <button class="nav-item active" data-view="list">
                            <i data-lucide="list"></i>
                            <span>Actividades</span>
                        </button>
                        <button class="nav-item" data-view="conectados">
                            <i data-lucide="rss"></i>
                            <span>Conectados</span>
                        </button>
                        <button class="nav-item" data-view="santi">
                            <i data-lucide="video"></i>
                            <span>Santi</span>
                        </button>
                    </nav>
                </div>
                
                <div class="top-bar-right">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="global-search" placeholder="Buscar actividad...">
                    </div>
                    
                    <button id="btn-toggle-past" class="btn-icon" title="Ver/Ocultar Pasadas">
                        <i data-lucide="history"></i>
                    </button>

                    <button id="btn-efemerides" class="btn-icon" title="Efemérides y Aniversarios">
                        <i data-lucide="calendar-clock"></i>
                    </button>

                    <button id="btn-new-activity" class="btn-primary">
                        <i data-lucide="plus"></i>
                        <span>Nueva Actividad</span>
                    </button>
                </div>
            </header>
            
            <div id="view-container" class="view-container">
                <!-- Content will be injected here by app.js -->
            </div>
        </main>

        <!-- Activity Detail Sheet (Modal/Panel) -->
        <div id="activity-sheet" class="sheet-overlay hidden">
            <div class="sheet-content">
                <!-- Content injected by components/ActivityForm.js -->
            </div>
        </div>

        <!-- Efemérides Modal -->
        <div id="efemerides-sheet" class="sheet-overlay hidden">
            <div class="sheet-content">
                <!-- Content injected by components/EfemeridesModal.js -->
            </div>
        </div>

        <!-- Mobile Bottom Tab Bar (visible solo en mobile via CSS) -->
        <nav class="mobile-bottom-tabs">
            <button class="nav-item active" data-view="list">
                <i data-lucide="calendar-days"></i>
                <span>Agenda</span>
            </button>
            <button class="nav-item" data-view="conectados">
                <i data-lucide="rss"></i>
                <span>Conectados</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
    <script>
        // Initialize Lucide icons after DOM content is loaded
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
