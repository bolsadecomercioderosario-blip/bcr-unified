<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot BCR | __VERSION__</title>
    <script src="/static/auth.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /*
         * Paleta inspirada en WhatsApp Web dark mode. La idea es que el
         * usuario que prueba esto desde desktop vea algo lo más parecido a
         * la experiencia real del WhatsApp del celular.
         */
        :root {
            --wa-bg: #0b141a;
            --wa-topbar: #1f2c34;
            --wa-input-bar: #1f2c34;
            --wa-input-field: #2a3942;
            --wa-bubble-bot: #1f2c34;
            --wa-bubble-user: #005c4b;
            --wa-text-primary: #e9edef;
            --wa-text-secondary: #8696a0;
            --wa-border: rgba(134, 150, 160, 0.15);
            --wa-green: #00a884;
            --wa-error: #f15c6d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--wa-bg);
            color: var(--wa-text-primary);
            display: flex;
            flex-direction: column;
        }

        /* ---- Top bar (estilo WhatsApp: header del contacto) ---- */
        .topbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            background: var(--wa-topbar);
            border-bottom: 1px solid var(--wa-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .topbar a.back {
            color: var(--wa-text-secondary);
            text-decoration: none;
            font-size: 1.1rem;
            padding: 0.25rem 0.5rem;
            border-radius: 50%;
            line-height: 1;
            transition: background 0.15s;
        }
        .topbar a.back:hover { background: rgba(255, 255, 255, 0.05); }
        .topbar .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--wa-green);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .topbar .who {
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.2;
            flex: 1;
        }
        .topbar .who .name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--wa-text-primary);
        }
        .topbar .who .status {
            font-size: 0.75rem;
            color: var(--wa-text-secondary);
        }
        .topbar button.reset {
            background: transparent;
            color: var(--wa-text-secondary);
            border: none;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 0.4rem 0.7rem;
            border-radius: 1rem;
            transition: background 0.15s;
        }
        .topbar button.reset:hover { background: rgba(255, 255, 255, 0.05); }

        /* ---- Área de chat ---- */
        .chat-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem 1rem 1.5rem;
            /* Sutil patrón geométrico para imitar el fondo de WhatsApp */
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.012) 0, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.012) 0, transparent 50%);
        }
        .chat {
            max-width: 760px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        /* ---- Bubbles ---- */
        .bubble {
            max-width: 78%;
            padding: 0.55rem 0.75rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.93rem;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.13);
        }
        .bubble.user {
            background: var(--wa-bubble-user);
            color: var(--wa-text-primary);
            align-self: flex-end;
            border-top-right-radius: 0.15rem;
        }
        .bubble.bot {
            background: var(--wa-bubble-bot);
            color: var(--wa-text-primary);
            align-self: flex-start;
            border-top-left-radius: 0.15rem;
        }
        .bubble.bot.loading {
            color: var(--wa-text-secondary);
            font-style: italic;
        }
        .bubble.bot.error {
            color: var(--wa-error);
        }
        .bubble .timestamp {
            display: block;
            font-size: 0.65rem;
            color: var(--wa-text-secondary);
            text-align: right;
            margin-top: 0.2rem;
            opacity: 0.75;
        }

        /* ---- Input bar abajo ---- */
        .input-bar {
            padding: 0.65rem 0.75rem;
            background: var(--wa-input-bar);
            display: flex;
            gap: 0.6rem;
            align-items: flex-end;
            border-top: 1px solid var(--wa-border);
        }
        .input-bar textarea {
            flex: 1;
            background: var(--wa-input-field);
            color: var(--wa-text-primary);
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 0.7rem 0.9rem;
            border-radius: 1.5rem;
            resize: none;
            min-height: 42px;
            max-height: 140px;
            line-height: 1.3;
        }
        .input-bar textarea::placeholder { color: var(--wa-text-secondary); }
        .input-bar button.send {
            background: var(--wa-green);
            color: #fff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.15s;
            flex-shrink: 0;
        }
        .input-bar button.send:hover:not(:disabled) { filter: brightness(1.08); }
        .input-bar button.send:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-bar button.send svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="/" class="back" title="Volver al hub">←</a>
        <div class="avatar">BCR</div>
        <div class="who">
            <span class="name">Bot BCR</span>
            <span class="status" id="conv-label">disponible</span>
        </div>
        <button class="reset" id="reset" style="display:none">Reiniciar</button>
    </div>

    <div class="chat-wrap">
        <div class="chat" id="chat"></div>
    </div>

    <div class="input-bar">
        <textarea id="msg" placeholder="Escribí un mensaje" rows="1"></textarea>
        <button class="send" id="send" title="Enviar">
            <svg viewBox="0 0 24 24"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"/></svg>
        </button>
    </div>

    <script>
        const chatEl = document.getElementById('chat');
        const chatWrapEl = document.querySelector('.chat-wrap');
        const msgEl = document.getElementById('msg');
        const sendBtn = document.getElementById('send');
        const resetBtn = document.getElementById('reset');
        const convLabel = document.getElementById('conv-label');

        // Memoria conversacional: guardamos el response_id del último turno
        // del bot y lo enviamos como previous_response_id en el siguiente.
        // OpenAI mantiene el contexto server-side.
        let lastResponseId = null;

        function nowTimestamp() {
            const d = new Date();
            return d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
        }

        function updateConvStatus() {
            if (lastResponseId) {
                convLabel.textContent = 'conversando…';
                resetBtn.style.display = '';
            } else {
                convLabel.textContent = 'disponible';
                resetBtn.style.display = 'none';
            }
        }

        function resetConversation() {
            lastResponseId = null;
            chatEl.innerHTML = '';
            updateConvStatus();
            msgEl.focus();
        }

        function addBubble(text, who) {
            const b = document.createElement('div');
            b.className = 'bubble ' + who;
            // Text + timestamp dentro del bubble (estilo WhatsApp).
            const textNode = document.createTextNode(text);
            b.appendChild(textNode);
            const ts = document.createElement('span');
            ts.className = 'timestamp';
            ts.textContent = nowTimestamp();
            b.appendChild(ts);
            chatEl.appendChild(b);
            // Auto-scroll a lo último.
            requestAnimationFrame(() => {
                chatWrapEl.scrollTop = chatWrapEl.scrollHeight;
            });
            return b;
        }

        async function send() {
            const text = msgEl.value.trim();
            if (!text) return;
            msgEl.value = '';
            msgEl.style.height = 'auto';
            sendBtn.disabled = true;

            addBubble(text, 'user');
            const loading = addBubble('escribiendo…', 'bot');
            loading.classList.add('loading');

            try {
                const res = await fetch('/api/bot/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        previous_response_id: lastResponseId,
                    }),
                });
                // Leemos como texto primero — si el server tira 500 con body
                // plain ("Internal Server Error"), JSON.parse rompe.
                const raw = await res.text();
                let data;
                try { data = JSON.parse(raw); } catch (_) { data = null; }
                loading.remove();
                if (!res.ok) {
                    const detail = (data && (data.detail || data.reply)) || raw || ('HTTP ' + res.status);
                    const b = addBubble('Error ' + res.status + ': ' + detail, 'bot');
                    b.classList.add('error');
                } else if (!data) {
                    const b = addBubble('Respuesta no-JSON: ' + raw, 'bot');
                    b.classList.add('error');
                } else {
                    addBubble(data.reply || '(sin respuesta)', 'bot');
                    if (data.response_id) {
                        lastResponseId = data.response_id;
                        updateConvStatus();
                    }
                }
            } catch (e) {
                loading.remove();
                const b = addBubble('Error de red: ' + (e.message || e), 'bot');
                b.classList.add('error');
            } finally {
                sendBtn.disabled = false;
                msgEl.focus();
            }
        }

        sendBtn.addEventListener('click', send);
        resetBtn.addEventListener('click', resetConversation);
        msgEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });
        msgEl.addEventListener('input', () => {
            msgEl.style.height = 'auto';
            msgEl.style.height = Math.min(msgEl.scrollHeight, 140) + 'px';
        });
    </script>
</body>
</html>
